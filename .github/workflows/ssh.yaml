name: SSH
'on':
  workflow_dispatch:
    inputs:
      freespace:
        description: Free Up Disk Space
        required: true
        type: boolean
        default: false
      swapspace:
        description: Add Swap ̳Space
        required: true
        type: boolean
        default: false
      swapsize:
        description: Swap Size (in gb)
        type: choice
        required: false
        options: [3, 5, 10]
        default: 5
      target_build:
        description: Target?
        type: choice
        required: true
        options: [ aarch64-unknown-linux-gnu, aarch64_be-unknown-linux-gnu, alphaev56-unknown-linux-gnu, alphaev67-unknown-linux-gnu, arm-unknown-linux-gnueabi, arm-unknown-linux-gnueabihf, armv4t-unknown-linux-gnueabi, armv5-unknown-linux-gnueabi, armv6-unknown-linux-gnueabi, armv6-unknown-linux-gnueabihf, armv7-unknown-linux-gnueabi, armv7-unknown-linux-gnueabihf, hppa-unknown-linux-gnu, hppa64-unknown-linux-gnu, i486-unknown-linux-gnu, i586-unknown-linux-gnu, i686-unknown-linux-gnu, loongarch32-unknown-linux-gnu, loongarch64-unknown-linux-gnu, m68k-unknown-linux-gnu, microblaze-xilinx-linux-gnu, microblazeel-xilinx-linux-gnu, mips-unknown-linux-gnu, mips-unknown-linux-gnusf, mips64-unknown-linux-gnu, mips64el-unknown-linux-gnu, mipsel-unknown-linux-gnu, mipsel-unknown-linux-gnusf, or1k-unknown-linux-gnu, powerpc-unknown-linux-gnu, powerpc-unknown-linux-gnusf, powerpc64-unknown-linux-gnu, powerpc64le-unknown-linux-gnu, powerpcle-unknown-linux-gnu, powerpcle-unknown-linux-gnusf, riscv32-unknown-linux-gnu, riscv64-unknown-linux-gnu, s390-ibm-linux-gnu, s390x-ibm-linux-gnu, sh4-multilib-linux-gnu, sparc-unknown-linux-gnu, sparc64-unknown-linux-gnu, x86_64-unknown-linux-gnu ]
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - '${{ inputs.target_build }}'
    steps:
      - if: '${{ inputs.freespace }}'
        name: Free Up Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          swap-storage: false
          large-packages: true
          tool-cache: true
          android: true
          dotnet: true
          haskell: false
          docker-images: true
      - if: '${{ inputs.swapspace }}'
        name: Add Swap Space for Build
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: '${{ inputs.swapsize }}'
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
      - name: Enable Kitware Repository
        run: |
          test -f /usr/share/doc/kitware-archive-keyring/copyright || wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
      - name: CCACHE Shit
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y update
          DEBIAN_FRONTEND=noninteractive sudo apt-get -y install apt-utils ccache ca-certificates gpg wget libzstd-dev

          cat >> $GITHUB_ENV << 'EOF'
          CCACHE_SLOPPINESS=file_macro,locale,time_macros
          CCACHE_NOHASHDIR=true
          CCACHE_COMPRESS=true
          CCACHE_COMPRESSLEVEL=16
          CCACHE_NOFILECLONE=true
          CCACHE_NOHARDLINK=true
          CCACHE_INODECACHE=true
          CCACHE_NLEVELS=4
          CCACHE_COMPILERCHECK=content
          CCACHE_DEPEND=true
          EOF

          # Setup CCACHE Dir
          sudo mkdir -p /mnt/ccache
          sudo chown -R $USER:$USER /mnt/ccache
          echo "CCACHE_DIR=/mnt/ccache" >> $GITHUB_ENV
          echo "CCACHE Dir Set!"
          df -h
          echo "CCACHE Environment set!"
      - name: Enable the CCACHE
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: 'true'
          key: 'ccache-${{ runner.os }}-${{ matrix.target }}'
          restore-keys: |
            ccache-${{ runner.os }}-
          max-size: 5000MB
          verbose: 2
          save: true
      - name: SSH Server-ing
        uses: valeriangalliat/action-sshd-cloudflared@v4
